name: Continuous Deployment

on:
  workflow_run:
    workflows: ["Backend CI", "Frontend CI"]
    types: [completed]

concurrency:
  group: deployment-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy frontend + backend after successful CI
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v4

      - name: Ensure both CI workflows succeeded for ref
        id: check_ci
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          owner=$(echo "${GITHUB_REPOSITORY}" | cut -d'/' -f1)
          repo=$(echo "${GITHUB_REPOSITORY}" | cut -d'/' -f2)
          # Helper to check latest run status for a workflow file
          check_workflow(){
            wf_file="$1"
            status=$(curl -s -H "Authorization: token ${GITHUB_TOKEN}" \
              "https://api.github.com/repos/${owner}/${repo}/actions/workflows/${wf_file}/runs?branch=main&per_page=1" \
              | jq -r '.workflow_runs[0].conclusion')
            echo "Latest run conclusion for ${wf_file}: ${status}"
            if [ "${status}" != "success" ]; then
              echo "Workflow ${wf_file} latest run not successful on main. Aborting." >&2
              exit 1
            fi
          }
          check_workflow backend-ci.yml
          check_workflow frontend-ci.yml

      - name: Deploy frontend to Vercel
        if: ${{ success() }}
        uses: amondnet/vercel-action@v20
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: frontend
          prod: true

      - name: Deploy backend to Railway
        if: ${{ success() }}
        env:
          RAILWAY_API_KEY: ${{ secrets.RAILWAY_API_KEY }}
          RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
          RAILWAY_SERVICE: ${{ secrets.RAILWAY_SERVICE_ID }}
        run: |
          set -e
          # Install railway CLI
          curl -sSL https://raw.githubusercontent.com/railwayapp/cli/master/install.sh | sh
          export PATH="$HOME/.railway/bin:$PATH"
          railway login --apiKey "$RAILWAY_API_KEY"
          # Deploy the service (assumes a service configured in Railway)
          railway up --project "$RAILWAY_PROJECT_ID" --service "$RAILWAY_SERVICE" --yes || true

      - name: Verify deployments
        env:
          FRONTEND_URL: ${{ secrets.FRONTEND_URL }}
          BACKEND_URL: ${{ secrets.BACKEND_URL }}
        run: |
          set -e
          echo "Checking frontend at ${FRONTEND_URL}"
          for i in {1..20}; do
            if curl -sSf ${FRONTEND_URL} >/dev/null; then echo "Frontend ok" && break; fi
            echo "waiting for frontend..."; sleep 3
          done

          echo "Checking backend health at ${BACKEND_URL}/health"
          for i in {1..20}; do
            if curl -sSf ${BACKEND_URL}/health >/dev/null; then echo "Backend health ok" && break; fi
            echo "waiting for backend..."; sleep 3
          done
