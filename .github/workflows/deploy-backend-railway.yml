name: Deploy Backend to Railway

on:
  push:
    branches: [ main ]

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Railway CLI
        run: npm install -g @railway/cli@latest

      - name: Deploy to Railway
        env:
          RAILWAY_API_KEY: ${{ secrets.RAILWAY_API_KEY }}
          RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
          RAILWAY_SERVICE_ID: ${{ secrets.RAILWAY_SERVICE_ID }}
        run: |
          set -euo pipefail
          if [ -z "$RAILWAY_API_KEY" ]; then
            echo "RAILWAY_API_KEY not set in secrets; skipping CI deploy."
            exit 0
          fi
          railway login --apiKey "$RAILWAY_API_KEY"
          if [ -n "$RAILWAY_PROJECT_ID" ]; then
            railway link --project "$RAILWAY_PROJECT_ID" || true
          fi
          if [ -n "$RAILWAY_SERVICE_ID" ]; then
            railway link --service "$RAILWAY_SERVICE_ID" || true
          fi
          railway up --ci
