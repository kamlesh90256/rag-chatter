version: '3.8'

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: rag
      POSTGRES_PASSWORD: ragpass
      POSTGRES_DB: ragdb
    volumes:
      - pg_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - '6333:6333'
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - DATABASE_URL=postgresql+psycopg://rag:ragpass@postgres:5432/ragdb
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - USE_QDRANT=true
      - QDRANT_URL=http://qdrant:6333
    ports:
      - '8000:8000'
    depends_on:
      - postgres
      - redis
      - qdrant
    restart: unless-stopped
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: '1.0'
          memory: 1024M
    networks:
      - monitoring

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A backend.celery_app.celery_app worker --loglevel=info
    environment:
      - DATABASE_URL=postgresql+psycopg://rag:ragpass@postgres:5432/ragdb
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    depends_on:
      - redis
      - backend
    restart: unless-stopped
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: '1.0'
          memory: 1024M

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      - NEXT_PUBLIC_API_BASE_URL=http://backend:8000
    ports:
      - '3000:3000'
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - monitoring

volumes:
  pg_data:
  qdrant_data:

networks:
  monitoring:
    driver: bridge
